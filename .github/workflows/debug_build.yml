name: Debug Build with Flutter Project (Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.5'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install flet
        run: |
          pip install flet==0.24.1

      - name: Try flet build with --project-dir
        id: build_with_dir
        continue-on-error: true
        run: |
          flet build apk --project-dir ./flutter_project --verbose
          echo "status=success" >> $GITHUB_OUTPUT

      - name: If --project-dir failed, capture temp project
        if: steps.build_with_dir.outputs.status != 'success'
        run: |
          # Run flet build in background
          flet build apk --verbose &
          BUILD_PID=$!
          # Wait for project creation (adjust sleep if needed)
          sleep 15
          # Find the most recent flet temp directory
          FLUTTER_PROJECT_DIR=$(find /tmp -maxdepth 1 -type d -name "flet_*" 2>/dev/null | sort -r | head -1)
          if [ -n "$FLUTTER_PROJECT_DIR" ]; then
            echo "Found Flutter project at $FLUTTER_PROJECT_DIR"
            cp -r "$FLUTTER_PROJECT_DIR" ./flutter_project
          else
            echo "No Flutter project found in /tmp"
          fi
          # Wait for build to complete
          wait $BUILD_PID

      - name: Upload Flutter project (if captured)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-project
          path: ./flutter_project

      - name: Upload APK (if generated)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            ./flutter_project/build/apk/app-release.apk
            ./build/apk/app-release.apk
          continue-on-error: true
