name: Build APK with Cache

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 1. 缓存 Flutter SDK 和 Pub 依赖
      - name: Set up Flutter (with cache)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.5'
          cache: true  # 关键：开启Flutter官方Action的内置缓存

      # 2. 手动缓存 Flutter Pub 依赖 (虽然上面开启了 cache，但为了更精确，可以再显式缓存)
      #    实际上 subosito/flutter-action 的 cache: true 已经包含了这一步。
      #    这里仅作为示例，你可以不用重复添加。它会自动缓存 ~/.pub-cache。
      
      # 3. 缓存 Android Gradle 依赖 (非常重要！)
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install flet
        run: |
          pip install flet==0.25.0

      - name: Create pyproject.toml with Android config
        run: |
          cat > pyproject.toml << 'EOF'
          [project]
          name = "discharge_app"
          version = "1.0.0"
          description = "入河排污口现场记录工具"
          requires-python = ">=3.8"
          dependencies = ["flet"]

          [tool.flet]
          org = "com.yourname"
          product = "排污口记录"

          [tool.flet.android]
          compile_sdk = 35
          target_sdk = 35
          min_sdk = 21
          EOF

      - name: Build APK
        run: |
          flet build apk --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/app-release.apk
