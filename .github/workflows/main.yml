name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.5'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install flet (固定版本 0.24.1)
        run: |
          pip install flet==0.24.1

      - name: Create pyproject.toml with Android config
        run: |
          cat > pyproject.toml << 'EOF'
          [project]
          name = "discharge_app"
          version = "1.0.0"
          description = "入河排污口现场记录工具"
          requires-python = ">=3.8"
          dependencies = [
              "flet"
          ]

          [tool.flet]
          org = "com.yourname"
          product = "排污口记录"

          [tool.flet.android]
          compile_sdk = 34
          target_sdk = 34
          min_sdk = 21
          EOF

      - name: Build APK
        run: |
          flet build apk --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/app-release.apk
